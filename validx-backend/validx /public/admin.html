<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F172A">
<title>ValidX Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0F172A;--bg2:#1E293B;--bg3:#334155;
    --indigo:#6366F1;--indigo-lt:#818CF8;
    --cyan:#06B6D4;--green:#10B981;--red:#EF4444;--amber:#F59E0B;
    --white:#FFFFFF;--text:#CBD5E1;--text-med:#94A3B8;--text-dim:#64748B;
    --radius:10px;--radius-sm:6px;
  }
  html,body{height:100%}
  body{
    font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;
  }
  a{color:var(--indigo-lt);text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none}

  /* Login */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,#1e293b 0%,#0f172a 60%)}
  .login-box{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .login-box h1{font-size:1.6rem;color:var(--white);margin-bottom:6px;letter-spacing:-.5px}
  .login-box h1 span{color:var(--cyan)}
  .login-box p{color:var(--text-med);margin-bottom:28px;font-size:.88rem}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  input,select,textarea{
    width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--bg3);
    border-radius:var(--radius-sm);color:var(--white);font-size:.9rem;
    font-family:inherit;transition:border-color .15s;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--indigo)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 18px;border-radius:var(--radius-sm);font-weight:600;font-size:.88rem;
    transition:all .15s;cursor:pointer;border:none;
  }
  .btn-primary{background:var(--indigo);color:#fff}
  .btn-primary:hover{background:#4f46e5}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--text);border:1.5px solid var(--bg3)}
  .btn-ghost:hover{border-color:var(--indigo-lt);color:var(--white)}
  .btn-danger{background:var(--red);color:#fff}
  .btn-danger:hover{background:#dc2626}
  .btn-success{background:var(--green);color:#fff}
  .btn-success:hover{background:#059669}
  .btn-sm{padding:6px 12px;font-size:.78rem}
  .btn-block{display:flex;width:100%}
  .err{color:var(--red);font-size:.82rem;margin-top:10px}

  /* Shell */
  .shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
  .sidebar{background:var(--bg2);border-right:1px solid var(--bg3);padding:24px 0;display:flex;flex-direction:column}
  .sidebar .brand{padding:0 24px 24px;font-size:1.3rem;font-weight:800;color:var(--white);letter-spacing:-.5px;border-bottom:1px solid var(--bg3);margin-bottom:14px}
  .sidebar .brand span{color:var(--cyan)}
  .sidebar .brand .tag{display:block;font-size:.68rem;color:var(--text-med);font-weight:600;letter-spacing:.5px;margin-top:2px}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:11px 24px;color:var(--text-med);
    font-size:.88rem;font-weight:600;transition:all .15s;cursor:pointer;
    border-left:3px solid transparent;
  }
  .nav-item:hover{color:var(--white);background:rgba(99,102,241,.06)}
  .nav-item.active{color:var(--white);background:rgba(99,102,241,.12);border-left-color:var(--indigo)}
  .nav-item .icon{font-size:1.1rem}
  .sidebar-footer{margin-top:auto;padding:20px 24px;border-top:1px solid var(--bg3);font-size:.78rem;color:var(--text-med)}
  .sidebar-footer .email{color:var(--white);font-weight:600;margin-bottom:8px;word-break:break-all}
  .sidebar-footer button{background:none;color:var(--text-med);padding:0;font-size:.78rem;font-weight:600}
  .sidebar-footer button:hover{color:var(--red)}

  /* Main */
  .main{padding:32px 36px;overflow-x:auto}
  .page-title{font-size:1.6rem;font-weight:800;color:var(--white);margin-bottom:6px;letter-spacing:-.5px}
  .page-sub{color:var(--text-med);margin-bottom:28px;font-size:.9rem}

  /* Stats grid */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
  .stat{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:20px}
  .stat .label{font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;color:var(--text-med);font-weight:700;margin-bottom:8px}
  .stat .value{font-size:1.8rem;font-weight:800;color:var(--white);line-height:1}
  .stat .sub{font-size:.76rem;color:var(--text-dim);margin-top:6px}
  .stat.indigo .value{color:var(--indigo-lt)}
  .stat.cyan .value{color:var(--cyan)}
  .stat.green .value{color:var(--green)}
  .stat.amber .value{color:var(--amber)}

  /* Table */
  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toolbar input,.toolbar select{width:auto;min-width:200px;padding:8px 12px;font-size:.82rem}
  .card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th{background:var(--bg);text-align:left;padding:12px 16px;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text-med);font-weight:700;border-bottom:1px solid var(--bg3)}
  td{padding:14px 16px;font-size:.86rem;color:var(--text);border-bottom:1px solid var(--bg3)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(99,102,241,.04)}
  .td-name{color:var(--white);font-weight:600}
  .td-sub{font-size:.74rem;color:var(--text-med);margin-top:2px}

  .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .pill-business{background:rgba(99,102,241,.15);color:var(--indigo-lt)}
  .pill-tester{background:rgba(6,182,212,.15);color:var(--cyan)}
  .pill-active{background:rgba(16,185,129,.15);color:var(--green)}
  .pill-completed{background:rgba(100,116,139,.15);color:var(--text-med)}
  .pill-archived{background:rgba(100,116,139,.1);color:var(--text-dim)}
  .pill-suspended{background:rgba(245,158,11,.15);color:var(--amber)}
  .pill-banned{background:rgba(239,68,68,.15);color:var(--red)}
  .pill-submitted{background:rgba(245,158,11,.15);color:var(--amber)}
  .pill-approved{background:rgba(16,185,129,.15);color:var(--green)}
  .pill-rejected{background:rgba(239,68,68,.15);color:var(--red)}
  .pill-pending{background:rgba(245,158,11,.15);color:var(--amber)}
  .pill-processing{background:rgba(99,102,241,.15);color:var(--indigo-lt)}
  .pill-paid{background:rgba(16,185,129,.15);color:var(--green)}
  .pill-failed{background:rgba(239,68,68,.15);color:var(--red)}

  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .empty{padding:48px;text-align:center;color:var(--text-med)}
  .empty .icon{font-size:2.6rem;margin-bottom:12px;opacity:.5}
  .loader{text-align:center;padding:48px;color:var(--text-med)}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
  .modal{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);max-width:580px;width:100%;max-height:90vh;overflow-y:auto;padding:28px}
  .modal h2{color:var(--white);margin-bottom:16px;font-size:1.2rem}
  .modal .meta{background:var(--bg);padding:14px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:.82rem}
  .modal .meta div{margin-bottom:4px}
  .modal .meta strong{color:var(--white)}
  .modal .notes{background:var(--bg);padding:14px;border-radius:var(--radius-sm);margin-bottom:16px;line-height:1.6;color:var(--text)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

  @media (max-width:900px){
    .shell{grid-template-columns:1fr}
    .sidebar{position:sticky;top:0;z-index:50;padding:14px}
    .sidebar .brand{padding:0 12px 14px}
    .nav-item{padding:10px 16px}
    .main{padding:20px}
    .stats{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

// API base — change this if backend runs on a different host
const API = window.VALIDX_API || 'http://localhost:4000/api';

// ── API helper ──────────────────────────────────────
async function api(path, opts = {}) {
  const token = localStorage.getItem('vx_admin_token');
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(opts.headers || {}),
    },
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ═══════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════
function Login({ onLogin }) {
  const [email, setEmail] = useState('admin@validx.com');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setErr(''); setLoading(true);
    try {
      const { token, user } = await api('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password }),
      });
      if (user.role !== 'admin') throw new Error('Not an admin account');
      localStorage.setItem('vx_admin_token', token);
      localStorage.setItem('vx_admin_user', JSON.stringify(user));
      onLogin(user);
    } catch (e) {
      setErr(e.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="login">
      <form className="login-box" onSubmit={handleSubmit}>
        <h1>Valid<span>X</span> Admin</h1>
        <p>Sign in to manage users, experiments, and payouts.</p>
        <div className="form-group">
          <label>Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} autoFocus />
        </div>
        <div className="form-group">
          <label>Password</label>
          <input type="password" value={password} onChange={e => setPassword(e.target.value)} />
        </div>
        {err && <div className="err">{err}</div>}
        <button type="submit" className="btn btn-primary btn-block" disabled={loading} style={{marginTop:16}}>
          {loading ? 'Signing in…' : 'Sign In'}
        </button>
      </form>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════
function Dashboard() {
  const [stats, setStats] = useState(null);
  const [err, setErr] = useState('');

  useEffect(() => {
    api('/admin/stats').then(setStats).catch(e => setErr(e.message));
  }, []);

  if (err) return <div className="err">{err}</div>;
  if (!stats) return <div className="loader">Loading…</div>;

  return (
    <>
      <h1 className="page-title">Dashboard</h1>
      <p className="page-sub">Overview of your platform.</p>
      <div className="stats">
        <div className="stat"><div className="label">Total Users</div><div className="value">{stats.users}</div><div className="sub">{stats.businesses} biz · {stats.testers} testers</div></div>
        <div className="stat indigo"><div className="label">Experiments</div><div className="value">{stats.experiments}</div><div className="sub">{stats.activeExperiments} active</div></div>
        <div className="stat cyan"><div className="label">Submissions</div><div className="value">{stats.submissions}</div><div className="sub">{stats.pendingSubmissions} pending review</div></div>
        <div className="stat green"><div className="label">Gross Revenue</div><div className="value">${stats.grossRevenue.toLocaleString()}</div><div className="sub">From paid experiments</div></div>
        <div className="stat green"><div className="label">Platform Margin</div><div className="value">${stats.platformMargin.toLocaleString()}</div><div className="sub">70% take rate</div></div>
        <div className="stat amber"><div className="label">Paid Out</div><div className="value">${stats.paidOut.toLocaleString()}</div><div className="sub">To testers</div></div>
        <div className="stat amber"><div className="label">Pending Payouts</div><div className="value">{stats.pendingPayouts}</div><div className="sub">Awaiting review</div></div>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════
// USERS
// ═══════════════════════════════════════════════════
function Users() {
  const [users, setUsers] = useState([]);
  const [role, setRole] = useState('');
  const [q, setQ] = useState('');
  const [loading, setLoading] = useState(true);

  const load = useCallback(() => {
    setLoading(true);
    const params = new URLSearchParams();
    if (role) params.set('role', role);
    if (q) params.set('q', q);
    api('/admin/users?' + params.toString())
      .then(d => setUsers(d.users))
      .finally(() => setLoading(false));
  }, [role, q]);

  useEffect(() => { load(); }, [load]);

  async function updateStatus(id, status) {
    await api('/admin/users/' + id, { method: 'PATCH', body: JSON.stringify({ status }) });
    load();
  }

  return (
    <>
      <h1 className="page-title">Users</h1>
      <p className="page-sub">Manage businesses and testers on the platform.</p>
      <div className="toolbar">
        <input type="text" placeholder="Search email, name, company…" value={q} onChange={e => setQ(e.target.value)} />
        <select value={role} onChange={e => setRole(e.target.value)}>
          <option value="">All roles</option>
          <option value="business">Business</option>
          <option value="tester">Tester</option>
        </select>
      </div>
      <div className="card">
        {loading ? <div className="loader">Loading…</div> : users.length === 0 ? (
          <div className="empty"><div className="icon">👥</div><div>No users found.</div></div>
        ) : (
          <table>
            <thead>
              <tr><th>User</th><th>Role</th><th>Org / School</th><th>Joined</th><th>Status</th><th></th></tr>
            </thead>
            <tbody>
              {users.map(u => (
                <tr key={u.id}>
                  <td>
                    <div className="td-name">{u.first_name} {u.last_name}</div>
                    <div className="td-sub">{u.email} · {u.auth_method}</div>
                  </td>
                  <td><span className={`pill pill-${u.role}`}>{u.role}</span></td>
                  <td>{u.company || u.school || '—'}</td>
                  <td>{fmtDate(u.created_at)}</td>
                  <td><span className={`pill pill-${u.status}`}>{u.status}</span></td>
                  <td>
                    <div className="actions">
                      {u.status !== 'active' && <button className="btn btn-ghost btn-sm" onClick={() => updateStatus(u.id, 'active')}>Activate</button>}
                      {u.status === 'active' && <button className="btn btn-ghost btn-sm" onClick={() => updateStatus(u.id, 'suspended')}>Suspend</button>}
                      {u.status !== 'banned' && <button className="btn btn-danger btn-sm" onClick={() => { if (confirm('Ban this user?')) updateStatus(u.id, 'banned'); }}>Ban</button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════
// EXPERIMENTS
// ═══════════════════════════════════════════════════
function Experiments() {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(() => {
    setLoading(true);
    api('/admin/experiments').then(d => setRows(d.experiments)).finally(() => setLoading(false));
  }, []);

  useEffect(() => { load(); }, [load]);

  async function updateStatus(id, status) {
    await api('/admin/experiments/' + id, { method: 'PATCH', body: JSON.stringify({ status }) });
    load();
  }

  return (
    <>
      <h1 className="page-title">Experiments</h1>
      <p className="page-sub">All validation experiments on the platform.</p>
      <div className="card">
        {loading ? <div className="loader">Loading…</div> : rows.length === 0 ? (
          <div className="empty"><div className="icon">🧪</div><div>No experiments yet.</div></div>
        ) : (
          <table>
            <thead>
              <tr><th>Experiment</th><th>Owner</th><th>Tier</th><th>Budget</th><th>Created</th><th>Status</th><th></th></tr>
            </thead>
            <tbody>
              {rows.map(e => (
                <tr key={e.id}>
                  <td>
                    <div className="td-name">{e.title}</div>
                    <div className="td-sub">{e.type}</div>
                  </td>
                  <td>
                    <div>{e.owner_company || e.owner_name}</div>
                    <div className="td-sub">{e.paid_with || '—'}</div>
                  </td>
                  <td>{e.tier}</td>
                  <td>${e.budget}</td>
                  <td>{fmtDate(e.created_at)}</td>
                  <td><span className={`pill pill-${e.status}`}>{e.status}</span></td>
                  <td>
                    <div className="actions">
                      {e.status === 'active' && <button className="btn btn-ghost btn-sm" onClick={() => updateStatus(e.id, 'completed')}>Complete</button>}
                      {e.status !== 'archived' && <button className="btn btn-ghost btn-sm" onClick={() => updateStatus(e.id, 'archived')}>Archive</button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════
// SUBMISSIONS
// ═══════════════════════════════════════════════════
function Submissions() {
  const [rows, setRows] = useState([]);
  const [filter, setFilter] = useState('submitted');
  const [loading, setLoading] = useState(true);
  const [viewing, setViewing] = useState(null);

  const load = useCallback(() => {
    setLoading(true);
    const p = new URLSearchParams();
    if (filter) p.set('status', filter);
    api('/admin/submissions?' + p.toString()).then(d => setRows(d.submissions)).finally(() => setLoading(false));
  }, [filter]);

  useEffect(() => { load(); }, [load]);

  async function updateStatus(id, status) {
    await api('/admin/submissions/' + id, { method: 'PATCH', body: JSON.stringify({ status }) });
    setViewing(null);
    load();
  }

  return (
    <>
      <h1 className="page-title">Submissions</h1>
      <p className="page-sub">Review and moderate tester submissions.</p>
      <div className="toolbar">
        <select value={filter} onChange={e => setFilter(e.target.value)}>
          <option value="submitted">Pending review</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
          <option value="">All</option>
        </select>
      </div>
      <div className="card">
        {loading ? <div className="loader">Loading…</div> : rows.length === 0 ? (
          <div className="empty"><div className="icon">📥</div><div>No submissions.</div></div>
        ) : (
          <table>
            <thead>
              <tr><th>Experiment</th><th>Tester</th><th>Preview</th><th>Payout</th><th>Submitted</th><th>Status</th><th></th></tr>
            </thead>
            <tbody>
              {rows.map(s => (
                <tr key={s.id}>
                  <td><div className="td-name">{s.experiment_title}</div></td>
                  <td>{s.tester_name}</td>
                  <td style={{maxWidth:280}}>
                    <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text-med)'}}>
                      {(s.notes || '').slice(0, 80)}…
                    </div>
                  </td>
                  <td>${s.payout}</td>
                  <td>{fmtDate(s.created_at)}</td>
                  <td><span className={`pill pill-${s.status}`}>{s.status}</span></td>
                  <td><button className="btn btn-ghost btn-sm" onClick={() => setViewing(s)}>Review</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {viewing && (
        <div className="modal-backdrop" onClick={() => setViewing(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h2>{viewing.experiment_title}</h2>
            <div className="meta">
              <div><strong>Tester:</strong> {viewing.tester_name}</div>
              <div><strong>Submitted:</strong> {fmtDate(viewing.created_at)}</div>
              <div><strong>Payout:</strong> ${viewing.payout}</div>
              <div><strong>Status:</strong> {viewing.status}</div>
            </div>
            <div className="notes">{viewing.notes}</div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => setViewing(null)}>Close</button>
              {viewing.status !== 'rejected' && <button className="btn btn-danger" onClick={() => updateStatus(viewing.id, 'rejected')}>Reject</button>}
              {viewing.status !== 'approved' && <button className="btn btn-success" onClick={() => updateStatus(viewing.id, 'approved')}>Approve</button>}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ═══════════════════════════════════════════════════
// PAYOUTS
// ═══════════════════════════════════════════════════
function Payouts() {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(() => {
    setLoading(true);
    api('/admin/payouts').then(d => setRows(d.payouts)).finally(() => setLoading(false));
  }, []);

  useEffect(() => { load(); }, [load]);

  async function updateStatus(id, status) {
    const ref = status === 'paid' ? prompt('Enter payment reference (optional):') : null;
    await api('/admin/payouts/' + id, { method: 'PATCH', body: JSON.stringify({ status, reference: ref }) });
    load();
  }

  return (
    <>
      <h1 className="page-title">Payouts</h1>
      <p className="page-sub">Review and process tester cashout requests.</p>
      <div className="card">
        {loading ? <div className="loader">Loading…</div> : rows.length === 0 ? (
          <div className="empty"><div className="icon">💸</div><div>No payout requests.</div></div>
        ) : (
          <table>
            <thead>
              <tr><th>Tester</th><th>Amount</th><th>Method</th><th>Requested</th><th>Paid</th><th>Status</th><th></th></tr>
            </thead>
            <tbody>
              {rows.map(p => (
                <tr key={p.id}>
                  <td>
                    <div className="td-name">{p.tester_name}</div>
                    <div className="td-sub">{p.email}</div>
                  </td>
                  <td style={{fontWeight:700,color:'var(--white)'}}>${p.amount}</td>
                  <td style={{textTransform:'capitalize'}}>{p.method}</td>
                  <td>{fmtDate(p.created_at)}</td>
                  <td>{fmtDate(p.paid_at)}</td>
                  <td><span className={`pill pill-${p.status}`}>{p.status}</span></td>
                  <td>
                    <div className="actions">
                      {p.status === 'pending' && <button className="btn btn-ghost btn-sm" onClick={() => updateStatus(p.id, 'processing')}>Process</button>}
                      {p.status !== 'paid' && <button className="btn btn-success btn-sm" onClick={() => updateStatus(p.id, 'paid')}>Mark Paid</button>}
                      {p.status !== 'failed' && p.status !== 'paid' && <button className="btn btn-danger btn-sm" onClick={() => updateStatus(p.id, 'failed')}>Fail</button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════
// SHELL
// ═══════════════════════════════════════════════════
function Shell({ user, onLogout }) {
  const [view, setView] = useState('dashboard');

  const Views = {
    dashboard: Dashboard,
    users: Users,
    experiments: Experiments,
    submissions: Submissions,
    payouts: Payouts,
  };
  const Current = Views[view];

  const nav = [
    { id: 'dashboard', icon: '📊', label: 'Dashboard' },
    { id: 'users', icon: '👥', label: 'Users' },
    { id: 'experiments', icon: '🧪', label: 'Experiments' },
    { id: 'submissions', icon: '📥', label: 'Submissions' },
    { id: 'payouts', icon: '💸', label: 'Payouts' },
  ];

  return (
    <div className="shell">
      <div className="sidebar">
        <div className="brand">Valid<span>X</span><span className="tag">Admin Panel</span></div>
        {nav.map(item => (
          <div key={item.id} className={`nav-item ${view === item.id ? 'active' : ''}`} onClick={() => setView(item.id)}>
            <span className="icon">{item.icon}</span>
            <span>{item.label}</span>
          </div>
        ))}
        <div className="sidebar-footer">
          <div className="email">{user.email}</div>
          <button onClick={onLogout}>Sign out</button>
        </div>
      </div>
      <div className="main">
        <Current />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// ROOT
// ═══════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('vx_admin_user') || 'null'); } catch { return null; }
  });

  useEffect(() => {
    // Verify session still valid on load
    if (user) {
      api('/auth/me').catch(() => {
        localStorage.removeItem('vx_admin_token');
        localStorage.removeItem('vx_admin_user');
        setUser(null);
      });
    }
  }, []);

  function logout() {
    localStorage.removeItem('vx_admin_token');
    localStorage.removeItem('vx_admin_user');
    setUser(null);
  }

  return user ? <Shell user={user} onLogout={logout} /> : <Login onLogin={setUser} />;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
